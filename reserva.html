<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva tu cupo</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:40px 20px;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
margin-bottom:30px;
font-size:18px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.1);
border-radius:15px;
padding:25px;
backdrop-filter:blur(6px);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card h2{
margin-bottom:10px;
font-size:24px;
}

.card p{
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:12px 20px;
border-radius:30px;
background:#ffd000;
color:black;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.disabled{
background:gray;
pointer-events:none;
}

.footer{
margin-top:40px;
font-size:14px;
opacity:0.8;
}
</style>

</head>

<body>

<div class="overlay">

<h1>Reserva tu cupo</h1>
<p class="subtitle">Selecciona el grupo que prefieras</p>

<div class="container">

<div class="card">
<h2>Grupo A</h2>
<p>Clases disponibles</p>
<a class="btn" href="https://forms.gle/f2Hv12E26fUUeybe8" target="_blank">
Ir al grupo
</a>
</div>

<div class="card">
<h2>Grupo B</h2>
<p>Clases disponibles</p>
<a class="btn" href="https://forms.gle/VneQMB8bw5UcjB959" target="_blank">
Ir al grupo
</a>
</div>

<div class="card">
<h2>Grupo C</h2>
<p>Clases disponibles</p>
<a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSfOCZObC-LdkOqnZgt0V70KeRKo0Y-cgusI3PJ3ISqt0UsTHA/viewform?usp=header" target="_blank">
Ir al grupo
</a>
</div>

<div class="card">
<h2>Grupo D</h2>
<p>Próximamente</p>
<a class="btn disabled">
No disponible
</a>
</div>

</div>

<div class="footer">
Clases de Inglés Online © 2026
</div>

</div>

</body>
</html>

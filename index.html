<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clases de Inglés</title>
  <style>
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg,#1e3c72,#2a5298);
      color:white;
      text-align:center;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:40px 20px;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    h2{
      font-size:28px;
      margin-top:0;
      opacity:0.9;
    }

    .price{
      font-size:40px;
      background:#ffcc00;
      color:#000;
      display:inline-block;
      padding:15px 25px;
      border-radius:12px;
      margin:25px 0;
      font-weight:bold;
    }

    .features{
      font-size:20px;
      line-height:1.6;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      background:#25D366;
      color:white;
      font-size:22px;
      padding:16px 30px;
      border-radius:40px;
      text-decoration:none;
      font-weight:bold;
      box-shadow:0 6px 15px rgba(0,0,0,0.25);
      transition:transform 0.2s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    footer{
      margin-top:60px;
      font-size:14px;
      opacity:0.8;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>Clases de Inglés</h1>
    <h2>Aprende inglés de forma fácil</h2>

    <div class="price">20.000 pesos mensuales</div>

    <div class="features">
      ✔ Clases todos los sábados<br>
      ✔ Explicaciones claras<br>
      ✔ Práctica de conversación<br>
      ✔ Ideal para principiantes
    </div>

    <a class="btn" href="https://wa.me/573218065239" target="_blank">
      Inscribirme por WhatsApp
    </a>

    <footer>
      Contacto: 321 806 5239
    </footer>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago del Curso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 360px;
        }
        h1 {
            color: #333;
        }
        .precio {
            font-size: 28px;
            color: #2c7be5;
            margin: 20px 0;
        }
        .metodos {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        form {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Pago del Curso</h1>
    <p>Accede a las clases de inglés al completar tu pago.</p>

    <div class="precio">$5.000 COP</div>

    <!-- ======= Botón de pago ePayco ======= -->
    <form>
        <script src='https://checkout.epayco.co/checkout.js'
            data-epayco-key='cd017e081e174550dc22d0d1ca8c6c64' 
            class='epayco-button' 
            data-epayco-amount='5000' 
            data-epayco-tax='0.00'  
            data-epayco-tax-ico='0.00'               
            data-epayco-tax-base='5000'
            data-epayco-name='Clases de inglés' 
            data-epayco-description='Clases de inglés' 
            data-epayco-currency='cop'    
            data-epayco-country='CO' 
            data-epayco-test='true' 
            data-epayco-external='false' 
            data-epayco-response=''  
            data-epayco-confirmation='' 
            data-epayco-button='https://multimedia.epayco.co/dashboard/btns/btn5.png'> 
        </script> 
    </form>
    <!-- =================================== -->

    <div class="metodos">
        Aceptamos:<br>
        💳 Tarjetas de crédito<br>
        🏦 PSE<br>
        📱 Nequi
    </div>

    <p style="margin-top:15px; font-size:12px; color:#777;">
        Pagos procesados para @COO3218065239
    </p>
</div>

</body>
</html>
